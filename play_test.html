<html>
    <head>
        <title>test level</title>
        <style>
          .scrolling-background {
          background-repeat: repeat-x;
        
          animation: scrollBackground 20s linear infinite;
        }

        @keyframes scrollBackground {
            from {
                background-position: 0 0;
            }
            to {
                background-position: -888.5 0; 
            }
        }
        #level_test_preview{
            animation: scrollBackground 20s linear infinite;
        }
        </style>
    </head>
    <body>
        <div id="level_test_screen" style="width: 908px; height: 908px; border: #222 1px solid; display: flex; flex-direction: column; margin: auto; margin-top: 24px;">
            <div id="level_test_nav" style="width: 98%; height: 72px; border: 1px solid #222; display: flex; flex-direction: column; margin-left: 8px;">
                <div style="width: 280px; height: 32px; border: solid #222 1px; display: flex; flex-direction: row;">
                    <div id="level_test_exit" style="background-color: rgb( 87, 50, 114); width: 28px; height: 28px; margin: 2px; border-radius: 3px; cursor: pointer;" title="Exit Test"></div>
                    <div id="level_test_level_name" style="position: relative; top: 6px;  left: 12px; width: 240px;"></div>
                </div>
                <div id="player_hud" style="display: flex; flex-direction: row; border: 1px solid black; width: 884px; height: 32px; margin: 2px; background-color: gold; justify-content: space-between;">
                    <div id="user_name_display" style="width: 120px; height: 28px; background-image: linear-gradient(#222, grey);margin: 2px; border-radius: 5px 0px 0px 5px; color: ghostwhite; text-align: center; justify-content: center; align-items: center; display: flex; cursor: pointer;" title="Username" ></div>
                    <div id="user_character_portrait" style="width: 120px; height: 28px; background-color: #222; margin: 2px; color: ghostwhite; text-align: center; justify-content: center; align-items: center; display: flex;"></div>
                    <div id="user_hearts"  style="width: 240px; height: 28px; background-image: linear-gradient(#222, grey);margin: 2px; color: ghostwhite; text-align: center; justify-content: center; align-items: center; display: flex;" title="Hearts"></div>
                    <div id="pause_menu" style="width: 120px; height: 28px; background-image: linear-gradient(#222, grey);margin: 2px; color: ghostwhite; text-align: center; justify-content: center; align-items: center; display: flex; cursor: pointer;" title="Open Menu">Menu</div>
                    <div id="save_menu" style="width: 120px; height: 28px; background-image: linear-gradient(#222, grey);margin: 2px; color: ghostwhite; text-align: center; justify-content: center; align-items: center; display: flex; cursor: pointer;" title="Save Menu">&#128427;</div>
                    <div id="exit_menu" style="width: 120px; height: 28px; background-image: linear-gradient(#222, grey);margin: 2px; color: ghostwhite; text-align: center; justify-content: center; align-items: center; display: flex; cursor: pointer; border-radius: 0px 5px 5px 0px;" title="Exit">Exit</div>
                </div>
            </div>
            <div id="level_test_level_holder" style="display: flex; flex-direction: column; ">
                <div id="level_test_preview" style=" width: 98%; height: 600px; border: 1px solid black; margin-left: 8px; margin-top: 2px; perspective: 800px; overflow: hidden; overflow: hidden;">
                    <!--World goes here-->
                </div>
                <div id="level_test_controller_dpad" style="position: relative; width: 120px; height: 120px; background-color: #2222225f; border-radius: 96px; display: flex; flex-direction: column; top: -122px; left: 15px;">
                    <div id="controller_up" style="width: 32px; height: 32px; border: #222 3px outset; border-radius: 32px; position: relative; left: 42px; cursor: pointer; background-color: #222; color: ghostwhite; display: flex; flex-direction: column; text-align: center; justify-content: center;">&#8593</div>
                    <div style="display: flex; flex-direction: row; position: relative; left: 0px; justify-content: space-evenly; top: 7px;">
                        <div id="controller_left" style="width: 32px; height: 32px; border: #222 3px outset; border-radius: 32px; position: relative;  cursor: pointer; background-color: #222; color: ghostwhite; display: flex; flex-direction: column; text-align: center; justify-content: center;">&#8592</div>
                        <div id="controller_turbo" style="width: 28px; height: 28px; border-radius: 16px; margin: 3px; border: 1px outset #222; background-color: #222; cursor: pointer;" title="TURBO"></div>
                        <div id="controller_right" style="width: 32px; height: 32px; border: #222 3px outset; border-radius: 32px; position: relative;  cursor: pointer; background-color: #222; color: ghostwhite; display: flex; flex-direction: column; text-align: center; justify-content: center;">&#8594</div>
                    </div>
                    <div id="controller_down" style="width: 32px; height: 32px; border: #222 3px outset; border-radius: 32px; position: relative; left: 40px; top: 9px; cursor: pointer; background-color: #222; color: ghostwhite; display: flex; flex-direction: column; text-align: center; justify-content: center;">&#8595</div>
                </div>
            </div>
        </div>
        <div id="user_stats_window" style="width: 240px; height: 240px; position: absolute; top: 120px; left: 120px; background-color: ghostwhite; border: 1px solid black; display: none; flex-direction: column;">
            <div style="display: flex; flex-direction: row; width: 100%; height: 28px;">
                <div id="user_stats_header" style="width: 210px; height: 28px; border-bottom: grey 1px solid;" title="click to drag"></div>
                <div id="user_stats_window_close" style="width: 26px; height: 26px; border: #222 1px solid; text-align: center; align-items: center; display: flex; flex-direction: column; justify-content: center; cursor: pointer; margin: 2px;" title="close">X</div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div>Hearts: </div>
                <div id="user_stats_hearts"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px; background-color: red; border-radius: 26px; margin: 2px; border: 2px inset black;" title="Defense"></div>
                <div id="user_stats_def" style="margin: 2px;"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px; background-color: orange; border-radius: 26px; margin: 2px; border: 2px inset black;" title="Resoration"></div>
                <div id="user_stats_res" style="margin: 2px;"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px; background-color: yellow; border-radius: 26px; margin: 2px; border: 2px inset black;" title="Attack"></div>
                <div id="user_stats_atk" style="margin: 2px;"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px; background-color: green; border-radius: 26px; margin: 2px; border: 2px inset black;" title="Evasion"></div>
                <div id="user_stats_eva" style="margin: 2px;"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px; background-color: blue; border-radius: 26px; margin: 2px; border: 2px inset black;" title="Special Attack"></div>
                <div id="user_stats_spATK" style="margin: 2px;"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px; background-color: indigo; border-radius: 26px; margin: 2px; border: 2px inset black;" title="Dexterity"></div>
                <div id="user_stats_dex" style="margin: 2px;"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px; background-color: violet; border-radius: 26px; margin: 2px; border: 2px inset black;" title="Special Defense"></div>
                <div id="user_stats_SPdef" style="margin: 2px;"></div>
            </div>
            <div style="display: flex; flex-direction: row;">
                <div style="width: 16px; height: 16px;  border-radius: 26px; margin: 2px;" title="Card Points">CP</div>
                <div id="user_stats_cp" style="margin: 2px 2px 2px 8px;"></div>
            </div>
        </div>
        <div id="pause_menu_window" style="position: absolute; width: 520px; height: 420px; top: 0px; left: 0px; border: 1px solid black; background-color: ghostwhite; display: none; flex-direction: column;">
            <div style="display: flex; flex-direction: row;">
                <div id="pause_menu_header" style="width: 481px; height: 26px; border-bottom: grey 1px solid; margin: 2px;" title="drag to move"></div>
                <div id="pause_menu_closer" style="width: 26px; height: 26px; border: 1px solid black; margin: 2px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;" title="close">X</div>
            </div>
            <div style="width: 512px; height: 26px; margin: 2px; display: flex; flex-direction: row; align-items: center; justify-content: space-around; border-bottom: grey 1px solid;">
                <div id="pause_nav_deck" style="cursor: pointer; padding: 2px; border-radius: 3px;">Deck</div>
                <div id="pause_nav_items" style="cursor: pointer; padding: 2px; border-radius: 3px;">Items</div>
                <div id="pause_nav_equipment" style="cursor: pointer; padding: 2px; border-radius: 3px;">Equipment</div>
                <div id="pause_nav_avatars" style="cursor: pointer; padding: 2px; border-radius: 3px;">Avatars</div>
                <div id="pause_nav_squad" style="cursor: pointer; padding: 2px; border-radius: 3px;">Squad</div>
                <div id="pause_nav_manifest" style="cursor: pointer; padding: 2px; border-radius: 3px;">Chat</div>
                <div id="pause_nav_journal" style="cursor: pointer; padding: 2px; border-radius: 3px;">Journal</div>
            </div>
            <div id="squad_pause_display" style="display: flex; flex-direction: column; width: 512px; height: 351px; border: 1px solid transparent; margin: 2px;">
                <div style="font-size: 12px; margin-left: 4px;">Current Squad</div>
                <div style="width: 510px; height: 308px; display: flex; flex-direction: column;">
                    <div id="member_1" style="width: 502px; height: 92px; border: black 1px solid; margin: 4px; display: flex; flex-direction: row; background-image: linear-gradient(#222, grey);">
                        <div id="member_1_avatar_portrait" style="width: 86px; height: 86px; background-color: aliceblue; margin: 3px; background-size: cover; background-repeat: no-repeat;"></div>
                        <div style="height: 86px; width: 150px; border: 1px solid transparent; margin: 3px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: left; text-align: left;">
                            <div id="member_1_user_name" style="font-size: 14px; color: yellow;"></div>
                            <div id="member_1_rank" style="font-size: 14px; color: yellow;"></div>
                        </div>
                        <div style="width: 240px; height: 84px; border: 1px solid transparent; margin: 3px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: left; text-align: left; color: yellow;">
                            <div id="member_1_avatar"></div>
                            <div id="member_1_hearts" style="color: violet; font-size: 18px;"></div>
                            <div id="member_1_avatar_level" style="color: ghostwhite;"></div>
                        </div>
                    </div>
                    </div>
                <div style="width: 510px; height: 24px; background-color: #222; justify-content: flex-end; display: flex;">
                    <div id="pause_coin_amount" style="margin: 3px; color: goldenrod; padding-right: 8px;">gil: </div>
                </div>
            </div>
            <div id="deck_pause_display" style="display: none; flex-direction: row; width: 512px; height: 351px; border: 1px solid transparent; margin: 2px;">
                <div id="deck_pause_left_panel" style="width: 256px; height: 351px; background-image: linear-gradient(#222, grey); display: flex; flex-direction: column;">
                    <div style="display: flex; flex-direction: row; margin: 4px">
                        <div style="color: yellow; margin-left: 4px;">CP: </div>
                        <div id="cp_used" style="color: yellow; margin-left: 4px;"></div>
                        <div style="color: yellow">/</div>
                        <div id="cp_max" style="color: yellow; margin-left: 4px;"></div>
                    </div>
                    <div id="equipped_deck" style="width: 100%; height: 323px; border: 1px solid transparent; overflow-y: scroll; display: flex; flex-wrap: wrap;"></div>
                </div>
                <div id="deck_pause_right_panel" style="width: 256px; height: 351px; background-image: linear-gradient(grey, #222); display: flex; flex-direction: column;">
                    <div style="margin: 4px; color: yellow;">Card Inventory</div>
                    <div id="users_card_inventory" style="width: 100%; height: 323px; border: 1px solid transparent; overflow-y: scroll; display: flex; flex-wrap: wrap;"></div>
                </div>
            </div>
            <div id="equipment_pause_display" style="display: none; flex-direction: row; width: 512px; height: 351px; border: 1px solid transparent; margin: 2px;">
                <div id="equip_panel_left" style="display: flex; flex-direction: column; width: 50%; height: 350px; border: transparent 1px solid; background-image: linear-gradient(#222, grey);">
                    <div style="margin: 4px; color: yellow;">Equipment</div>
                    <div id="user_equipment_inventory" style="display: flex; flex-direction: column; width: 255px; height: 322px; overflow-y: scroll; border: 1px solid transparent;"></div>
                </div>
            <div id="equip_panel_right" style="display: flex; flex-direction: column; width: 50%; height: 350px; border: transparent 1px solid; background-image: linear-gradient( grey, #222); justify-content: center; align-items: center;">
                <div id="equip_slot_1" style="width: 96px; height: 120px; border: 3px inset white; border-radius: 4px; background-color: #222; color: ghostwhite; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 4px;">Slot 1<br>empty</div>
                <div style="display: flex; flex-direction: row; justify-content: space-evenly;">
                    <div id="equip_slot_2" style="width: 96px; height: 120px; border: 3px inset white; border-radius: 4px; background-color: #222; color: ghostwhite; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 4px;">Slot 2<br>empty</div>
                    <div id="equip_slot_3" style="width: 96px; height: 120px; border: 3px inset white; border-radius: 4px; background-color: #222; color: ghostwhite; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 4px;">Slot 3<br>empty</div>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
<script src="./data_base.js" id="data_base"></script>
<script src="./level_shared.js"></script>
<script src="./game_play.js"></script>
<script src="./play_test.js"></script>
