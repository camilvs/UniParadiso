<script>
  const body = document.getElementById('body');
  let level_test_screen = document.getElementById('level_test_screen');
  let level_test_nav = document.getElementById('level_test_nav');
  let level_test_menu = document.getElementById('level_test_menu');
  let level_test_level_name = document.getElementById('level_test_level_name');
  function ensureLevelShape(level){
    if(!level) return null;
    level.faces ??= { face_back:[], face_left:[], face_right:[], face_top:[], face_bottom:[] };
    level.objects = Array.isArray(level.objects) ? level.objects : [];
    level.npcs    = Array.isArray(level.npcs)    ? level.npcs    : [];
    return level;
  }

  window.onload = () => {
    const rawLevels = localStorage.getItem("levels");
    const testIdRaw = localStorage.getItem("test_level_id");

    console.log("play_test: raw localStorage keys:", {
      has_levels: !!rawLevels,
      test_level_id: testIdRaw
    });

    if(!rawLevels){
      console.warn("play_test: No 'levels' found in localStorage.");
      return;
    }
    if(!testIdRaw){
      console.warn("play_test: No 'test_level_id' found in localStorage.");
      return;
    }

    let levels;
    try {
      levels = JSON.parse(rawLevels);
    } catch (e) {
      console.error("play_test: Failed to JSON.parse(levels):", e);
      return;
    }

    const testId = Number(testIdRaw);
    const level = ensureLevelShape(levels.find(l => Number(l.id) === testId) || null);

    if(!level){
      console.warn("play_test: Level id not found:", testId);
      return;
    }

    //Proof: show what transferred
    console.log("Transferred Level Object:", level);

    // nice summary (so you don’t have to expand giant arrays every time)
    const summary = {
      id: level.id,
      name: level.name,
      size: level.size,
      background: level.background,
      faces: Object.fromEntries(
        Object.entries(level.faces).map(([k, arr]) => [k, Array.isArray(arr) ? arr.filter(v => v !== undefined).length : 0])
      ),
      objects_count: (level.objects || []).length,
      npcs_count: (level.npcs || []).length,
      sample_object: (level.objects || [])[0] || null,
      sample_npc: (level.npcs || [])[0] || null
    };

    console.log("✅ Transfer Summary:", summary);

    // let npc_box = document.getElementById('npc_box');
    // level.npcs.forEach(npc =>{
    //     npc_box.innerHTML = summary.sample_npc.dialogue;
    //     Object.assign(npc_box.style,{
    //         width: '120px',
    //         height: '120px',
    //         backgroundImage: `url(./images/npc_${summary.sample_npc.sprite_id}.png)`,
    //         backgroundPostion: 'center',
    //         backgroundSize: 'cover'
    //     });
    // });

    // body.style.backgroundImage = `url(./images/background${summary.background}.png)`
    // console.log(summary.npcs_count);
    level_test_level_name.textContent = summary.name;
    };

</script>
